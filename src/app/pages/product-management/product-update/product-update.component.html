<div class="px-4 py-8 flex justify-center">
  <div class="w-full max-w-xl bg-[var(--color-card)] 
              border border-[var(--color-border)] 
              rounded-2xl p-6 shadow-lg">

    <app-back link="admin-shop/products"/>
    <h2 class="title">
      Modifier un produit
    </h2>

      <form [formGroup]="form" (ngSubmit)="onSubmit()">

      <!-- ERREURS BACKEND -->
      @if (errors().length > 0) {
        <div class="bg-[var(--color-danger)]
                    border border-[var(--color-danger)] 
                    text-[var(--color-danger)] 
                    p-4 rounded-xl text-sm space-y-1">
          @for (err of errors(); track err) {
            <p>{{ err }}</p>
          }
        </div>
      }

      <!-- NAME -->
      <div class="space-y-2 m-3">
        <label for="name" class="text-sm text-[var(--color-text-secondary)]">
          Nom du produit
        </label>
      <input 
        id="name" 
        type="text" 
        formControlName="name" 
        class="w-full px-4 py-3 rounded-xl
                  bg-[var(--color-bg)]
                  border border-[var(--color-border)]
                  text-[var(--color-text-primary)]
                  focus:outline-none
                  focus:ring-2
                  focus:ring-[var(--color-accent)]
                  transition"
        [ngClass]="{
          'border-[var(--color-danger)] focus:ring-[var(--color-danger)]':
          isInvalid(form.controls.name)
        }"
      >
      <p class="error" *ngIf="isInvalid(form.controls.name) && form.controls.name.hasError('required')"
        class="text-sm text-[var(--color-danger)]">
        Le nom est obligatoire
      </p>
    </div>

    <!-- Prix -->
    <div class="space-y-2 m-3">
      <label for="price" class="text-sm text-[var(--color-text-secondary)]">
        Prix
      </label>
      <input 
        id="price" 
        type="number" 
        formControlName="price"
        class="w-full px-4 py-3 rounded-xl
                  bg-[var(--color-bg)]
                  border border-[var(--color-border)]
                  text-[var(--color-text-primary)]
                  focus:outline-none
                  focus:ring-2
                  focus:ring-[var(--color-accent)]
                  transition"
        [ngClass]="{
          'border-[var(--color-danger)] focus:ring-[var(--color-danger)]':
          isInvalid(form.controls.price)
        }"
      >
      <p class="error" *ngIf="isInvalid(form.controls.price) && form.controls.price.hasError('required')"
        class="text-sm text-[var(--color-danger)]">
        Le prix est obligatoire
      </p>
    </div>

    <!-- Unite -->
    <div class="space-y-2 m-3">
      <label for="uom" class="text-sm text-[var(--color-text-secondary)]">
        Unite
      </label>
      <select 
        id="uom" formControlName="uomId"
        class="w-full px-4 py-3 rounded-xl
                  bg-[var(--color-bg)]
                  border border-[var(--color-border)]
                  text-[var(--color-text-primary)]
                  focus:outline-none
                  focus:ring-2
                  focus:ring-[var(--color-accent)]
                  transition"
        [ngClass]="{
          'border-[var(--color-danger)] focus:ring-[var(--color-danger)]':
          isInvalid(form.controls.uomId)
        }"
      >
        @for (u of uoms(); track u._id) {
          <option [value]="u._id">{{ u.name }}</option>
        }
      </select>
      <p class="error" *ngIf="isInvalid(form.controls.uomId) && form.controls.uomId.hasError('required')"
        class="text-sm text-[var(--color-danger)]">
        L'unite est obligatoire
      </p>
    </div>

    <!-- Categorie -->
    <div class="space-y-2 m-3">
      <label for="category" class="text-sm text-[var(--color-text-secondary)]">
        Categorie
      </label>
      <select 
        id="category" 
        formControlName="categoryId"
        class="w-full px-4 py-3 rounded-xl
                  bg-[var(--color-bg)]
                  border border-[var(--color-border)]
                  text-[var(--color-text-primary)]
                  focus:outline-none
                  focus:ring-2
                  focus:ring-[var(--color-accent)]
                  transition"
        [ngClass]="{
          'border-[var(--color-danger)] focus:ring-[var(--color-danger)]':
          isInvalid(form.controls.categoryId)
        }"
      >
        @for (c of categories(); track c._id) {
          <option [value]="c._id">{{ c.name }}</option>
        }
      </select>
      <p class="error" *ngIf="isInvalid(form.controls.categoryId) && form.controls.categoryId.hasError('required')"
        class="text-sm text-[var(--color-danger)]">
        La categorie est obligatoire
      </p>
    </div>

      <!-- SUBMIT -->
      <div>
        <button
          type="submit"
          [disabled]="form.invalid"
          class="w-full py-3 rounded-xl font-semibold
                  bg-[var(--color-accent)]
                  text-white
                  transition
                  hover:bg-[var(--color-accent-hover)]
                  disabled:opacity-50
                  disabled:cursor-not-allowed">
          Valider
        </button>
      </div>
    </form>
  </div>
</div>
