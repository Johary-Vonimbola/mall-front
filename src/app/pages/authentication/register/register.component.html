<form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="header-form">
        <img src="/assets/img/logo.webp" alt="Logo" class="logo">
        @if(accountCreated()){
            <app-check-mark />
            <p class="success-message">Account created</p>
        }@else{
            <h2>Register</h2>
        }
    </div>
    <div class="main-form">
        <div class="errors">
            @for (err of errors(); track err) {
                <p class="header-error">{{ err }}</p>
            }
        </div>
        <div class="input-group">
            <label for="name">Name</label>
            <input formControlName="name" type="text" id="name" [ngClass]="{ 'is-invalid': isInvalid(form.controls.name) }"> 
            <p *ngIf="isInvalid(form.controls.name) && form.controls.name.hasError('required')" class="error">
                Name is required
            </p>
        </div>
        <div class="input-group">
            <label for="email">Email</label>
            <input formControlName="email" type="email" id="email" [ngClass]="{ 'is-invalid': isInvalid(form.controls.email) }">
            <p *ngIf="isInvalid(form.controls.email) && form.controls.email.hasError('required')" class="error">
                Email is required
            </p>
            <p *ngIf="form.controls.email.hasError('email')" class="error">
                Invalid Format
            </p>
        </div>
        <div class="input-group">
            <label for="contact">Contact</label>
            <input formControlName="contact" type="text" id="contact" [ngClass]="{ 'is-invalid': isInvalid(form.controls.contact) }">
            <p *ngIf="isInvalid(form.controls.contact) && form.controls.contact.hasError('required')" class="error">
                Contact is required
            </p>
        </div>
        <div class="input-group">
            <label for="passwordHash">Password</label>
            <input formControlName="passwordHash" type="password" id="passwordHash" [ngClass]="{ 'is-invalid': isInvalid(form.controls.passwordHash) }">
            <p *ngIf="isInvalid(form.controls.passwordHash) && form.controls.passwordHash.hasError('required')" class="error">
                Password is required
            </p>
        </div>
        <div class="input-group">
            <button [disabled]="form.invalid" type="submit">Sign up</button>
        </div>
    </div>
    <div class="footer-form">
        <p>Back to <a (click)="onLogin()">Login</a></p>
    </div>
</form>
