<div class="flex flex-col gap-2">
  <div class="absolute -top-32 -left-32 w-96 h-96 
              bg-[radial-gradient(circle,_#6366f1_0%,_transparent_60%)] 
              opacity-30 blur-3xl">
  </div>

  <div class="absolute bottom-0 right-0 w-80 h-80 
              bg-[radial-gradient(circle,_#ec4899_0%,_transparent_60%)] 
              opacity-30 blur-3xl">
  </div>

  <div class="relative z-10 flex flex-col lg:flex-row lg:items-center lg:justify-center lg:min-h-screen lg:gap-24">
    <div class="header-form lg:flex lg:flex-col lg:justify-center">
      <img class="w-52 mx-auto lg:w-[25rem]" src="/assets/img/inter-logo.png" alt="Logo">
      <h2 class="title text-center text-3xl text-[var(--color-text-secondary)] mt-4 lg:mt-6">
        @if(accountCreated()){ 
            <app-check-mark />
            <p class="success-message">Account created</p> 
        }@else{ Inscription }
      </h2>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" 
          class="bg-[var(--color-card)] border border-[var(--color-border)] px-3 mx-4 py-4 rounded-lg lg:w-[30rem] lg:py-10 space-y-6">

      <div class="errors">
        @for (err of errors(); track err) {
          <p class="bg-[var(--color-danger)]/10 
                     text-[var(--color-danger)] 
                     p-4 rounded-xl text-sm mb-2">{{ err }}</p>
        }
      </div>

      <div class="space-y-2">
        <label for="name" class="text-sm text-[var(--color-text-secondary)]">Nom</label>
        <input id="name" type="text" placeholder="John" formControlName="name"
               class="w-full px-4 py-3 rounded-xl
                      bg-[var(--color-bg)]
                      border border-[var(--color-border)]
                      text-[var(--color-text-primary)]
                      focus:outline-none
                      focus:ring-2
                      focus:ring-[var(--color-accent)]
                      transition"
               [ngClass]="{'border-[var(--color-danger)] focus:ring-[var(--color-danger)]': isInvalid(form.controls.name)}"/>
        <p *ngIf="isInvalid(form.controls.name) && form.controls.name.hasError('required')"
           class="text-sm text-[var(--color-danger)] mt-1 ml-1">
          Le nom est obligatoire
        </p>
      </div>

      <div class="space-y-2">
        <label for="email" class="text-sm text-[var(--color-text-secondary)]">Email</label>
        <input id="email" type="email" placeholder="john@gmail.com" formControlName="email"
               class="w-full px-4 py-3 rounded-xl
                      bg-[var(--color-bg)]
                      border border-[var(--color-border)]
                      text-[var(--color-text-primary)]
                      focus:outline-none
                      focus:ring-2
                      focus:ring-[var(--color-accent)]
                      transition"
               [ngClass]="{'border-[var(--color-danger)] focus:ring-[var(--color-danger)]': isInvalid(form.controls.email)}"/>
        <p *ngIf="isInvalid(form.controls.email) && form.controls.email.hasError('required')"
           class="text-sm text-[var(--color-danger)] mt-1 ml-1">
          L'email est obligatoire
        </p>
        <p *ngIf="form.controls.email.hasError('email')"
           class="text-sm text-[var(--color-danger)] mt-1 ml-1">
          Format d'email invalide
        </p>
      </div>

      <div class="space-y-2">
        <label for="contact" class="text-sm text-[var(--color-text-secondary)]">Contact</label>
        <input id="contact" type="text" placeholder="034 00 000 00" formControlName="contact"
               class="w-full px-4 py-3 rounded-xl
                      bg-[var(--color-bg)]
                      border border-[var(--color-border)]
                      text-[var(--color-text-primary)]
                      focus:outline-none
                      focus:ring-2
                      focus:ring-[var(--color-accent)]
                      transition"
               [ngClass]="{'border-[var(--color-danger)] focus:ring-[var(--color-danger)]': isInvalid(form.controls.contact)}"/>
        <p *ngIf="isInvalid(form.controls.contact) && form.controls.contact.hasError('required')"
           class="text-sm text-[var(--color-danger)] mt-1 ml-1">
          Le contact est obligatoire
        </p>
      </div>

      <div class="space-y-2">
        <label for="passwordHash" class="text-sm text-[var(--color-text-secondary)]">Mot de passe</label>
        <input id="passwordHash" type="password" placeholder="****" formControlName="passwordHash"
               class="w-full px-4 py-3 rounded-xl
                      bg-[var(--color-bg)]
                      border border-[var(--color-border)]
                      text-[var(--color-text-primary)]
                      focus:outline-none
                      focus:ring-2
                      focus:ring-[var(--color-accent)]
                      transition"
               [ngClass]="{'border-[var(--color-danger)] focus:ring-[var(--color-danger)]': isInvalid(form.controls.passwordHash)}"/>
        <p *ngIf="isInvalid(form.controls.passwordHash) && form.controls.passwordHash.hasError('required')"
           class="text-sm text-[var(--color-danger)] mt-1 ml-1">
          Le mot de passe est obligatoire
        </p>
      </div>

      <div>
        <button type="submit" [disabled]="form.invalid"
                class="w-full py-3 rounded-xl font-semibold
                       bg-[var(--color-accent)]
                       text-white
                       transition
                       hover:bg-[var(--color-accent-hover)]
                       disabled:opacity-50
                       disabled:cursor-not-allowed">
          S'inscrire
        </button>
      </div>

      <div class="footer-form text-center text-[var(--color-text-primary)] mt-4">
        <p>Retour à <a (click)="onLogin()" class="underline cursor-pointer">Login</a></p>
      </div>

    </form>
  </div>
</div>
