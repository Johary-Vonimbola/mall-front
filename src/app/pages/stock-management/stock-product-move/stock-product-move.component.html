<div class="m-4 p-6 rounded-2xl bg-[var(--color-card)] border border-[var(--color-border)] shadow-xl space-y-6">

  <!-- HEADER -->
  <div class="border-b border-gray-100 pb-4">
    <h2 class="text-[var(--color-text-secondary)] text-3xl font-extrabold underline">
      Mouvement de stock
    </h2>
  </div>

  <!-- TABLE -->
  <div class="overflow-x-auto">
    <table class="w-full text-left border-collapse">

      <thead>
        <tr class="bg-[var(--color-bg)] text-[var(--color-text-secondary)]">
          <th class="p-3 rounded-tl-xl">Parent</th>
          <th class="p-3">Produit</th>
          <th class="p-3">Type</th>
          <th class="p-3">Quantité</th>
          <th class="p-3 rounded-tr-xl">Créé le</th>
        </tr>
      </thead>

      <tbody>

        @for (move of lines(); track move._id) {

        <tr class="border-b border-[var(--color-border)] hover:bg-[var(--color-bg)] transition">

          <!-- PARENT -->
          <td class="p-3 text-[var(--color-text-secondary)] text-sm">
            {{ move.parentId }}
          </td>

          <!-- PRODUIT -->
          <td class="p-3 text-[var(--color-text-primary)] font-semibold">
            {{ move.productName }}
          </td>

          <!-- TYPE -->
          <td class="p-3">
            <span
              class="px-3 py-1 rounded-full text-sm font-semibold text-white"
              [ngClass]="move.type === 'IN'
                ? 'bg-[var(--color-success)]'
                : 'bg-[var(--color-danger)]'"
            >
              {{ move.type }}
            </span>
          </td>

          <!-- QUANTITY -->
          <td class="p-3 font-bold"
              [ngClass]="move.type === 'IN'
                ? 'text-[var(--color-success)]'
                : 'text-[var(--color-danger)]'">
            {{ move.quantity }}
          </td>

          <!-- DATE -->
          <td class="p-3 text-[var(--color-text-secondary)] text-sm">
            {{ move.createdAt | date : "dd-MM-YYYY HH:mm"}}
          </td>

        </tr>

        }

      </tbody>

    </table>
  </div>

</div>
