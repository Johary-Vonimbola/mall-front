<h2>Details</h2>

<table border="1">
  <thead>
    <tr>
      <th>Parent</th>
      <th>Produit</th>
      <th>Type</th>
      <th>Quantite</th>
    </tr>
  </thead>
  <tbody>
    @for (move of stockMoveLines(); track move._id) {
      <tr>
        <td>{{ move.parentId }}</td>
        <td>{{ move.productName }}</td>
        <td>{{ move.type }}</td>
        <td>{{ move.quantity }}</td>
      </tr>
    }
  </tbody>
</table>
