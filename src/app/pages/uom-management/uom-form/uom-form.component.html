<div class="px-4 py-8 flex justify-center">
  <div class="w-full max-w-xl bg-[var(--color-card)] 
              border border-[var(--color-border)] 
              rounded-2xl p-6 shadow-lg">

    <app-back link="admin-shop/uoms" />
    <h2 class="title">Créer une unité de mesure</h2>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-6">

      <div *ngIf="errors().length > 0" class="bg-[var(--color-danger)]/10 
                                           border border-[var(--color-danger)] 
                                           text-[var(--color-danger)] 
                                           p-4 rounded-xl text-sm space-y-1">
        @for (err of errors(); track err) {
          <p>{{ err }}</p>
        }
      </div>

      <div class="space-y-2">
        <label for="name" class="text-sm text-[var(--color-text-secondary)]">Nom de l'unité</label>
        <input id="name" type="text" formControlName="name"
               placeholder="Nom de l'unité"
               class="w-full px-4 py-3 rounded-xl
                      bg-[var(--color-bg)]
                      border border-[var(--color-border)]
                      text-[var(--color-text-primary)]
                      focus:outline-none
                      focus:ring-2
                      focus:ring-[var(--color-accent)]
                      transition"
               [ngClass]="{
                 'border-[var(--color-danger)] focus:ring-[var(--color-danger)]':
                 isInvalid(form.controls.name)
               }"/>
        <p *ngIf="isInvalid(form.controls.name) && form.controls.name.hasError('required')"
           class="text-sm text-[var(--color-danger)]">
          Le nom est obligatoire
        </p>
      </div>

      <div class="space-y-2">
        <label for="abbr" class="text-sm text-[var(--color-text-secondary)]">Abbreviation</label>
        <input id="abbr" type="text" formControlName="abbr"
               placeholder="Abbreviation"
               class="w-full px-4 py-3 rounded-xl
                      bg-[var(--color-bg)]
                      border border-[var(--color-border)]
                      text-[var(--color-text-primary)]
                      focus:outline-none
                      focus:ring-2
                      focus:ring-[var(--color-accent)]
                      transition"
               [ngClass]="{
                 'border-[var(--color-danger)] focus:ring-[var(--color-danger)]':
                 isInvalid(form.controls.abbr)
               }"/>
        <p *ngIf="isInvalid(form.controls.abbr) && form.controls.abbr.hasError('required')"
           class="text-sm text-[var(--color-danger)]">
          L'abbreviation est obligatoire
        </p>
      </div>

      <div>
        <button type="submit" [disabled]="form.invalid"
                class="w-full py-3 rounded-xl font-semibold
                       bg-[var(--color-accent)]
                       text-white
                       transition
                       hover:bg-[var(--color-accent-hover)]
                       disabled:opacity-50
                       disabled:cursor-not-allowed">
          Valider
        </button>
      </div>

    </form>
  </div>
</div>
