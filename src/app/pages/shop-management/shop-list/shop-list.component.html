<div class="card">
  <div class="shop-list">
    <div
      class="shop-item"
      *ngFor="let shop of shops(); let first = first"
      [class.border-top]="!first"
    >
      <!-- LEFT -->
      <div class="shop-info">
        <span class="category">
          {{ shop.category }}
        </span>

        <span class="name">
          {{ shop.name }}
        </span>
      </div>

      <!-- RIGHT -->
      <div class="actions">
        <!-- STATUS -->
        <span
          class="status"
          [class.active]="shop.isActive"
          [class.inactive]="!shop.isActive"
        >
          {{ shop.isActive ? 'ACTIVE' : 'INACTIVE' }}
        </span>

        <!-- BUTTONS -->
        <button
            type="button"
          *ngIf="!shop.isActive"
          class="btn btn-success"
          (click)="activate(shop.id)"
        >
          Activer
        </button>

        <button
          *ngIf="shop.isActive"
          class="btn btn-warning"
          (click)="deactivate(shop.id)"
        >
          Désactiver
        </button>

        <button
          class="btn btn-default"
          (click)="update(shop.id)"
        >
          Modifier
        </button>

        <button
          class="btn btn-success"
          (click)="openModal(shop.id)"
        >
          Upload
        </button>

        <!-- Modal pour ce shop -->
        <div class="modal" *ngIf="activeUploadShopId === shop.id">
          <div class="modal-content">
            <span class="close" (click)="closeModal()">&times;</span>
            <h2>Upload Logo</h2>

            <form (submit)="upload(); $event.preventDefault()">
              <!-- Label + Input -->
              <label for="logoInput">Logo :</label>
              <input
                id="logoInput"
                type="file"
                (change)="onFileSelected($event)"
                accept="image/*"
              />

              <!-- Bouton Upload -->
              <button type="submit" [disabled]="!selectedFile">Upload</button>
            </form>
          </div>
        </div>

        
        <button
          class="btn btn-danger"
          (click)="remove(shop.id)"
        >
          Supprimer
        </button>
      </div>
    </div>
  </div>
</div>
