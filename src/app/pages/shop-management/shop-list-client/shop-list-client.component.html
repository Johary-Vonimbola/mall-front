<span class="mt-4 flex items-center justify-center text-3xl underline font-bold text-[var(--color-text-primary)]">Liste Boutique</span>
<div class="mx-4 grid grid-cols-[repeat(auto-fit,minmax(300px,1fr))] grid-flow-row gap-4">
  @for (shop of shops(); track shop.id; let first = $first) {
    @if (shop.isActive) {
      <div class="flex flex-col max-w-96 m-4 p-4 border-2 border-[var(--color-border)] rounded bg-[var(--color-card)]">

        <div class="bg-slate-500 flex p-1 rounded-t text-[var(--color-text-primary)]">
          <label class="w-full text-2xl font-bold">{{ shop.name }}</label>
          <label class="flex justify-end text-sm">{{ shop.category }}</label>
        </div>

        <img class="grow" [src]="environment+shop.logo" [alt]="environment+shop.logo">

        <button class="w-full h-10 bg-[var(--color-success)] rounded-b text-xl font-semibold hover:bg-[var(--color-accent)]" type="button" (click)="visit(shop.id)">
          Visiter
        </button>
      </div>
    }
  }
</div>
