<form [formGroup]="form" (ngSubmit)="onSubmit()">
  <div class="main-form">

    <!-- erreurs backend -->
    <div class="errors">
      @for (err of errors(); track err) {
        <p class="header-error">{{ err }}</p>
      }
    </div>

    <!-- NAME -->
    <div class="input-group">
      <label for="name">Nom de la boutique</label>
      <input
        id="name"
        type="text"
        placeholder="Extra Pizza"
        formControlName="name"
        [ngClass]="{'is-invalid': isInvalid(form.controls.name)}"
      />

      <p *ngIf="isInvalid(form.controls.name) && form.controls.name.hasError('required')" class="error">
        Le nom est obligatoire
      </p>
    </div>

    <!-- SUBMIT -->
    <div class="input-group">
        <button [disabled]="form.invalid" type="submit">Connexion</button>
    </div>

  </div>
</form>
