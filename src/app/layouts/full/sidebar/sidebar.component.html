<aside>
  <nav>
    <ul class="menu">

      <!-- DASHBOARD -->
      <li class="menu-item">
        <a routerLink="dashboard">
          <div class="menu-link">
            <img class="icon" src="/assets/icons/dashboard.png" alt="Icon Dashboard">
            <span>Dashboard</span>
          </div>
        </a>
      </li>

      <!-- SHOPS -->
      <li class="menu-item has-children" [class.open]="shopsOpen">
        <div class="menu-link" (click)="toggleShops()">
          <img class="icon" src="/assets/icons/store.png" alt="Icon Shop">
          <span>Shops</span>
        </div>

        <ul class="submenu">
          <li class="submenu-item" routerLinkActive="active">
            <a routerLink="shops">
              <img class="icon" src="/assets/icons/list.png" alt="">
              <span>List</span>
            </a>
          </li>

          <li class="submenu-item" routerLinkActive="active">
            <a routerLink="shop-form">
              <img class="icon" src="/assets/icons/form.png" alt="">
              <span>New</span>
            </a>
          </li>
        </ul>
      </li>

      <!-- SHOPS CATEGORIES -->
      <li class="menu-item has-children" [class.open]="shopCategoriesOpen">
        <div class="menu-link" (click)="toggleShopCategories()">
          <img class="icon" src="/assets/icons/categorization.png" alt="Icon Shop Categories">
          <span>Shop Categories</span>
        </div>

        <ul class="submenu">
          <li class="submenu-item" routerLinkActive="active">
            <a routerLink="shop-categories">
              <img class="icon" src="/assets/icons/list.png" alt="">
              <span>List</span>
            </a>
          </li>

          <li class="submenu-item" routerLinkActive="active">
            <a routerLink="shop-category-form">
              <img class="icon" src="/assets/icons/form.png" alt="">
              <span>New</span>
            </a>
          </li>
        </ul>
      </li>

      <!-- RENT -->
      <li class="menu-item has-children" [class.open]="rentOpen">
        <div class="menu-link" (click)="toggleRent()">
          <img class="icon" src="/assets/icons/rent.png" alt="Icon Shop Rent">
          <span>Rent</span>
        </div>

        <ul class="submenu">
          <li class="submenu-item" routerLinkActive="active">
            <a routerLink="shop-rent-list">
              <img class="icon" src="/assets/icons/list.png" alt="">
              <span>List</span>
            </a>
          </li>

          <li class="submenu-item" routerLinkActive="active">
            <a routerLink="shop-rent-form">
              <img class="icon" src="/assets/icons/form.png" alt="">
              <span>New</span>
            </a>
          </li>
        </ul>
      </li>

      <!-- LOGOUT -->
      <li class="menu-item logout" (click)="logout()">
        <div class="menu-link">
          <img class="icon" src="/assets/icons/logout.png" alt="Icon logout">
          <span>Logout</span>
        </div>
      </li>

    </ul>
  </nav>
</aside>
