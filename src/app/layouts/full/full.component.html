<div class="layout bg-[var(--color-bg)]">

  <app-header (clickHamburger)="toogleSidebar($event)"></app-header>

  <app-sidebar (closeSidebar)="toogleSidebar($event)" [open]="isSidebarOpen()"></app-sidebar>

  <main class="flex-1 bg-[var(--color-bg)] overflow-x-hidden lg:mt-24" [ngClass]="{ 'pointer-events-none opacity-5': isSidebarOpen() }">
    <router-outlet></router-outlet>
  </main>

  <app-footer></app-footer>

</div>
